# Host nginx — spikeiq.chickenkiller.com → Docker stack on 127.0.0.1:9080
# Copy to /etc/nginx/sites-available/spikeiq.chickenkiller.com then certbot for SSL.
#
# IMPORTANT: Use separate locations — proxy_buffering off ONLY for WebSockets.
# Buffering off on static JS causes NS_BINDING_ABORTED for slow remote clients.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name spikeiq.chickenkiller.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name spikeiq.chickenkiller.com;

    # Certbot fills these paths after: sudo certbot --nginx -d spikeiq.chickenkiller.com
    # ssl_certificate /etc/letsencrypt/live/spikeiq.chickenkiller.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/spikeiq.chickenkiller.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    # Shared proxy defaults (buffering ON for static assets / API)
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    proxy_buffer_size 128k;
    proxy_buffers 8 256k;
    proxy_busy_buffers_size 512k;

    # WebSocket — buffering off
    location /api/ws/ {
        proxy_pass http://127.0.0.1:9080;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    # Built JS/CSS — longer timeout for slow international links
    location /assets/ {
        proxy_pass http://127.0.0.1:9080;
        proxy_buffering on;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:9080;
        proxy_buffering on;
    }
}
