# Host nginx — HTTP (redirect to HTTPS after certbot) OR initial setup before SSL.
# Proxies spikeiq.mooo.com → SpikeIQ Docker stack on 127.0.0.1:9080

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name spikeiq.mooo.com;

    location / {
        proxy_pass http://127.0.0.1:9080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }
}

# After certbot, ensure the HTTPS server block ALSO includes the same proxy headers.
# Certbot often omits WebSocket upgrade headers — Market Stream stays OFFLINE without them.
