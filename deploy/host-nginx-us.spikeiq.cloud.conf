# Host nginx — us.spikeiq.cloud → Docker stack on 127.0.0.1:9080
# ---------------------------------------------------------------
# 1. Copy to /etc/nginx/sites-available/us.spikeiq.cloud
# 2. Symlink: sudo ln -s /etc/nginx/sites-available/us.spikeiq.cloud /etc/nginx/sites-enabled/
# 3. Test & reload: sudo nginx -t && sudo systemctl reload nginx
# 4. Issue SSL: sudo certbot --nginx -d us.spikeiq.cloud
#
# IMPORTANT: proxy_buffering off ONLY for WebSockets.
# Buffering off on static JS/CSS causes NS_BINDING_ABORTED for slow remote clients.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name us.spikeiq.cloud;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name us.spikeiq.cloud;

    # Certbot fills these paths after: sudo certbot --nginx -d us.spikeiq.cloud
    # ssl_certificate /etc/letsencrypt/live/us.spikeiq.cloud/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/us.spikeiq.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;

    # Shared proxy defaults (buffering ON for static assets / REST API)
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    proxy_buffer_size 128k;
    proxy_buffers 8 256k;
    proxy_busy_buffers_size 512k;

    # WebSocket — buffering OFF (market stream)
    location /api/ws/ {
        proxy_pass http://127.0.0.1:9080;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    # API routes (REST)
    location /api/ {
        proxy_pass http://127.0.0.1:9080;
        proxy_buffering on;
    }

    # Built JS/CSS — cache immutable hashed assets
    location /assets/ {
        proxy_pass http://127.0.0.1:9080;
        proxy_buffering on;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend SPA — catch-all
    location / {
        proxy_pass http://127.0.0.1:9080;
        proxy_buffering on;
    }
}
