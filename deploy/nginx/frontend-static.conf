# Serves the Vite production build (SPA) inside the frontend container.
server {
    listen 5173;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    sendfile on;
    tcp_nopush on;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /favicon.svg {
        try_files /icons.svg =404;
        expires 7d;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
