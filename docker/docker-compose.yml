services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:latest
    container_name: ib_gateway
    restart: always
    environment:
      # Credentials loaded from .env
      TWS_USERID: ${TWS_USERID}
      TWS_PASSWORD: ${TWS_PASSWORD}
      
      # Configuration
      TRADING_MODE: ${TRADING_MODE:-paper}
      READ_ONLY_API: ${READ_ONLY_API:-yes}
      VNC_SERVER_PASSWORD: ${VNC_SERVER_PASSWORD:-vncpass}
      TIME_ZONE: ${TZ:-America/New_York}
      
      # Automation settings
      BYPASS_WARNING: "yes"
      AUTO_RESTART_TIME: "23:45" # Nightly automatic restart time
      AUTO_LOGOFF_TIME: "23:50"  # Nightly automatic logoff time
      JAVA_HEAP_SIZE: "1024"
    ports:
      # Host 4002 maps to internal 4004 (Paper trading API)
      - "127.0.0.1:4002:4004"
      # Host 5900 maps to internal 5900 (VNC GUI)
      - "127.0.0.1:5900:5900"
    volumes:
      # Persist settings, cache, and logs
      - tws_settings:/home/ibgateway/Jts
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f ibcalpha.ibc.IbcGateway || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 30s

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: spikeiq_clickhouse
    restart: always
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-trade_analytics_us}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-clickhouse_user}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-clickhouse_pass}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: spikeiq_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-security_master}
      POSTGRES_USER: ${POSTGRES_USER:-trade_analytics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trade_analytics_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trade_analytics} -d ${POSTGRES_DB:-security_master}"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: 'Mk3OEYBSD34fcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  backend:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    container_name: quant_backend
    restart: always
    depends_on:
      ib-gateway:
        condition: service_started
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/api/health'', timeout=5)"',
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    ports:
      - "8000:8000"
    environment:
      - IB_HOST=ib-gateway
      - IB_PORT=4004
      - READ_ONLY_API=yes
      - TWS_USERID=${TWS_USERID}
      - TWS_PASSWORD=${TWS_PASSWORD}
      - TRADING_MODE=${TRADING_MODE:-paper}
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-clickhouse_user}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-clickhouse_pass}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-trade_analytics_us}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-trade_analytics}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-trade_analytics_pass}
      - POSTGRES_DB=${POSTGRES_DB:-security_master}
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-trade_analytics}:${POSTGRES_PASSWORD:-trade_analytics_pass}@postgres:5432/${POSTGRES_DB:-security_master}
      - DEFAULT_STREAM_SYMBOLS=${DEFAULT_STREAM_SYMBOLS:-AAPL,MSFT,NVDA,TSLA,SPX,NDX,SPCX,META,GOOGL,AMZN}
      - IB_RESOLVE_CLIENT_ID=${IB_RESOLVE_CLIENT_ID:-12}
      - PYTHONUNBUFFERED=1
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - PRE_SPIKE_ALERT_POLL_SECONDS=${PRE_SPIKE_ALERT_POLL_SECONDS:-1}
      - PRE_SPIKE_ALERT_LOOKBACK_SECONDS=${PRE_SPIKE_ALERT_LOOKBACK_SECONDS:-300}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
    container_name: quant_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  scheduler:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    container_name: quant_scheduler
    restart: always
    command: python scripts/scheduler.py
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      ib-gateway:
        condition: service_healthy
    environment:
      - IB_HOST=ib-gateway
      - IB_PORT=4004
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-trade_analytics}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-trade_analytics_pass}
      - POSTGRES_DB=${POSTGRES_DB:-security_master}
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-trade_analytics}:${POSTGRES_PASSWORD:-trade_analytics_pass}@postgres:5432/${POSTGRES_DB:-security_master}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - IB_CLIENT_ID=${IB_RESOLVE_CLIENT_ID:-12}
      - PYTHONUNBUFFERED=1

volumes:
  tws_settings:
    driver: local
  clickhouse_data:
    driver: local
  postgres_data:
    driver: local

