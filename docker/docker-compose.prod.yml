# Production overlay for VPS deployment.
# Isolated project name avoids conflicting with other Docker apps on the host.
name: spikeiq_us

services:
  clickhouse:
    ports: !reset []

  kafka:
    ports: !reset []

  backend:
    ports: !reset []

  frontend:
    ports: !reset []

  nginx:
    image: nginx:1.27-alpine
    container_name: spikeiq_nginx
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      # Bind to localhost only — host nginx/Caddy proxies spikeiq.mooo.com here
      - "127.0.0.1:9080:80"
    volumes:
      - ../deploy/nginx/spikeiq.conf:/etc/nginx/conf.d/default.conf:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
